<section class="section experience">
    <h2 class="title section-title" data-i18n="section.experience.title">
        {{t 'section.experience.title'}}
    </h2>
    <p class="desc" data-i18n="section.experience.desc">
        {{t 'section.experience.desc'}}
    </p>
    <ul class="experience-list">
        {{#each experience}}
        <li class="experience-item">
            <h3 class="experience-title" data-i18n="experience.{{@index}}.title">{{{title.en}}}</h3>
            <p class="experience-desc" data-i18n="experience.{{@index}}.description">{{{description.en}}}</p>
        </li>
        {{/each}}
    </ul>
</section>
