<!doctype html>
<html class="no-js" lang="en">

<head>
    {{> head/head head.defaults}}
    {{> before-page-content/js-checker}}
    {{> before-page-content/language-pre-init}}
    {{> before-page-content/theme-switcher}}
</head>

<body class="page">
<a href="#main-content" class="skip-link">Skip to main content</a>
%=symbols=%
<div class="page-wrapper">
    <div class="container">
        {{> header/header}}
    </div>
    <main id="main-content" class="container sections">
        {{> sections/sections}}
    </main>
    <div class="container">
        {{> footer/footer}}
    </div>
</div>

<script src="%=static=%js/main%=hash=%%=min=%.js" async></script>

</body>

</html>
