<!doctype html>
<html class="no-js" lang="en">

<head>
    {{> head/head head.defaults}}
    {{> before-page-content/theme-switcher}}
    <style>:root:not([data-lang-ready]){visibility:hidden}</style>
    <script>
        /**
         * Language pre-initialization script.
         * Sets data-lang-ready attribute when no translation needed (English default),
         * or stores pending language in data-pending-lang attribute for language-switcher.js to process.
         * Contract: language-switcher.js reads data-pending-lang on init.
         */
        (function() {
            const KEY = 'preferred-lang';
            const saved = localStorage.getItem(KEY);
            if (!saved || saved === 'en') {
                document.documentElement.setAttribute('data-lang-ready', '');
            } else {
                document.documentElement.setAttribute('data-pending-lang', saved);
            }
        })();
    </script>
</head>

<body class="page">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    %=symbols=%
    <div class="page-wrapper">
        <div class="container">
            {{> header/header}}
        </div>
        <main id="main-content" class="container sections">
            <div class="sections-aside">
                {{> languages/languages}}
                {{> skills/skills}}
            </div>
            <div class="sections-main">
                {{> experience/experience}}
                {{> achievements/achievements}}
            </div>
        </main>
        <div class="container">
            {{> footer/footer}}
        </div>
    </div>

    <script src="%=static=%js/main%=hash=%%=min=%.js" async></script>

</body>

</html>
